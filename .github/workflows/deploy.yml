name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Lint & Unit Tests
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/actions-setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Frontend & Backend Dependencies
        run: |
          npm ci
          cd backend && npm ci
          cd ../frontend && npm ci

      - name: Run Linters
        run: |
          cd backend && npm run lint || echo "Lint skipped"
          cd ../frontend && npm run lint || echo "Lint skipped"

      - name: Run Backend Unit Tests
        run: |
          cd backend && npm run test -- --passWithNoTests

  # Job 2: Build & Deploy to AWS EKS
  cd:
    name: Continuous Deployment
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      EKS_CLUSTER_NAME: sales-agent-eks
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build & Push Microservice Docker Images
      - name: Build and Push Docker Images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          # API Gateway
          docker build -t $ECR_REGISTRY/api-gateway:$COMMIT_SHA -t $ECR_REGISTRY/api-gateway:latest -f infrastructure/docker/api-gateway/Dockerfile .
          docker push $ECR_REGISTRY/api-gateway:$COMMIT_SHA
          docker push $ECR_REGISTRY/api-gateway:latest

          # Lead Service
          docker build -t $ECR_REGISTRY/lead-service:$COMMIT_SHA -t $ECR_REGISTRY/lead-service:latest -f infrastructure/docker/lead-service/Dockerfile .
          docker push $ECR_REGISTRY/lead-service:$COMMIT_SHA
          docker push $ECR_REGISTRY/lead-service:latest

          # AI Service
          # Note: Creating dummy requirements.txt if not exists for docker context compatibility
          touch requirements.txt
          docker build -t $ECR_REGISTRY/ai-service:$COMMIT_SHA -t $ECR_REGISTRY/ai-service:latest -f infrastructure/docker/ai-service/Dockerfile .
          docker push $ECR_REGISTRY/ai-service:$COMMIT_SHA
          docker push $ECR_REGISTRY/ai-service:latest

          # Worker Service
          docker build -t $ECR_REGISTRY/worker-service:$COMMIT_SHA -t $ECR_REGISTRY/worker-service:latest -f infrastructure/docker/worker-service/Dockerfile .
          docker push $ECR_REGISTRY/worker-service:$COMMIT_SHA
          docker push $ECR_REGISTRY/worker-service:latest

      # Update Kubeconfig & Trigger Rolling Update on EKS
      - name: Update Kubeconfig & Deploy to EKS
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
          
          # Rollout deployments to trigger EKS pulling the latest ECR image
          kubectl rollout restart deployment/api-gateway
          kubectl rollout restart deployment/lead-service
          kubectl rollout restart deployment/ai-service
          kubectl rollout restart deployment/worker-service
          
          # Verify rollouts
          kubectl rollout status deployment/api-gateway --timeout=120s
          kubectl rollout status deployment/lead-service --timeout=120s
          kubectl rollout status deployment/ai-service --timeout=120s
          kubectl rollout status deployment/worker-service --timeout=120s
